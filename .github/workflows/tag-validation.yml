name: Tag Validation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-tag:
    name: validate release tag without publishing
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -e ".[dev]"

      - name: Validate tag package
        shell: pwsh
        run: |
          python -m ruff check .
          python -m pytest -q
          python -m build
          python -m twine check dist/*
          python scripts/qa/validate_package_data.py --repo . --dist-dir dist
          python scripts/qa/validate_distribution.py --repo .
