name: CI Linux diagnosis

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture Office OS test progress
        shell: bash
        run: |
          set +e
          timeout --foreground --signal=TERM --kill-after=10s 120s \
            python -u scripts/ci_test_runner.py --timeout-seconds 90 --grace-seconds 5 -- \
            python -u -m unittest discover -s tests -v > ci-test.log 2>&1
          result=$?
          printf '\n[diagnostic] command-exit=%s\n' "$result" >> ci-test.log
          exit 0
      - name: Upload Office OS test progress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-progress
          path: ci-test.log
          if-no-files-found: error
      - name: Mark diagnostic run incomplete
        run: exit 1
