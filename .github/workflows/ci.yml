name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Office OS tests
        run: python -m unittest -v tests.test_ci_test_runner

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Office OS tests
        run: python scripts/ci_test_runner.py --timeout-seconds 60 --grace-seconds 5 -- python -m unittest -v tests.test_ci_test_runner
