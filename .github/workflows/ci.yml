name: CI Linux diagnosis

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run OfficeCLI tree-kill diagnosis
        shell: bash
        run: python -u scripts/ci_test_runner.py --timeout-seconds 30 --grace-seconds 5 -- python -u -m unittest -v tests.test_officecli.OfficeCLICase.test_runner_kills_tree_on_timeout_and_overflow
