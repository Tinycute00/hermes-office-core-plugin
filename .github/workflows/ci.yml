name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Office OS tests
        run: python -m unittest discover -s tests -v

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Office OS tests
        run: timeout --foreground --kill-after=30s 12m python -m unittest discover -s tests -v
