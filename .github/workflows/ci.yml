name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  quality:
    name: package and plugin validation
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Validate distribution contract
        run: python scripts/qa/validate_distribution.py --repo .

      - name: Validate package data
        run: python scripts/qa/validate_package_data.py --repo . --dist-dir dist

      - name: Validate docs, skills, and inventory
        shell: pwsh
        run: |
          python scripts/qa/validate_docs.py --repo .
          python scripts/qa/validate_skills.py --repo .
          python scripts/qa/validate_inventory.py --inventory docs/inventory/skill-mcp-inventory.json

      - name: Optional plugin smoke command
        if: ${{ env.HERMES_PLUGIN_SMOKE == '1' }}
        shell: pwsh
        run: |
          ./scripts/qa/plugin-smoke.ps1 -RepoRoot . -Evidence "$env:RUNNER_TEMP/plugin-smoke.txt"
